# Renderのブループリント: このファイルをリポジトリに置いたまま
# Render Dashboard → New → Blueprint で指定すれば、Web ServiceとPostgreSQLが一括で作成されます
services:
  - type: web
    name: socialhub-web
    env: node
    plan: free
    buildCommand: npm ci && npm run build && npx prisma migrate deploy && node prisma/seed.js
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: socialhub-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: NEXTAUTH_URL
        sync: false            # Render UI で自ドメインを設定
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false            # 例: https://socialhub-web.onrender.com (同一サービス)
      - key: SOCKET_PORT
        value: "3001"
      - key: ADMIN_INITIAL_PASSWORD
        value: "admin1234"
      - key: NODE_VERSION
        value: "20"
      - key: IMAGEKIT_PUBLIC_KEY
        sync: false          # imagekit.io ダッシュボードの値をRender UIで設定
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false          # 同上(秘密鍵。絶対にコードに書かない)
      - key: IMAGEKIT_URL_ENDPOINT
        sync: false          # 例: https://ik.imagekit.io/xxxxxxx

databases:
  - name: socialhub-db
    plan: free
    databaseName: socialhub
    user: socialhub
